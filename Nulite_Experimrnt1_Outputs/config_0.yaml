random_seed: 42
gpu: 0
logging:
  log_comment: NuLite-BoundaryLoss-Exp1
  log_dir: /content/drive/MyDrive/NuLite_Exp1_outputs
  wandb_dir: /content/drive/MyDrive/NuLite_Exp1_outputs
  level: Debug
  mode: offline
eval_checkpoint: /content/drive/MyDrive/NuLite_Exp1_outputs/checkpoints/model_best.pth
data:
  dataset: PanNuke
  dataset_path: /content/data_processed
  num_nuclei_classes: 6
  num_tissue_classes: 19
  train_folds:
  - 0
  val_folds:
  - 1
  test_folds:
  - 2
model:
  backbone: fastvit_t8
training:
  epochs: 20
  batch_size: 16
  drop_rate: 0
  unfreeze_epoch: 0
  early_stopping_patience: 20
  mixed_precision: true
  optimizer: AdamW
  optimizer_hyperparameter:
    lr: 0.0003
    weight_decay: 0.0001
    betas:
    - 0.85
    - 0.95
  scheduler:
    scheduler_type: exponential
    hyperparameters:
      gamma: 0.85
  sampling_strategy: cell+tissue
  sampling_gamma: 0.85
loss:
  nuclei_binary_map:
    dice:
      loss_fn: dice_loss
      weight: 1
    focaltverskyloss:
      loss_fn: FocalTverskyLoss
      weight: 1
  hv_map:
    mse:
      loss_fn: mse_loss_maps
      weight: 1
    msge:
      loss_fn: msge_loss_maps
      weight: 1
  nuclei_type_map:
    bce:
      loss_fn: xentropy_loss
      weight: 1
    dice:
      loss_fn: dice_loss
      weight: 1
    mcfocaltverskyloss:
      loss_fn: MCFocalTverskyLoss
      weight: 1
      args:
        num_classes: 6
  tissue_types:
    ce:
      loss_fn: CrossEntropyLoss
      weight: 1
transformations:
  randomrotate90:
    p: 0.5
  horizontalflip:
    p: 0.5
  verticalflip:
    p: 0.5
  blur:
    p: 0.2
    blur_limit: 11
  gaussnoise:
    p: 0.25
    var_limit: 50
  colorjitter:
    p: 0.2
    scale_setting: 0.25
    scale_color: 0.1
  elastictransform:
    p: 0.2
  downscale:
    p: 0.15
    scale: 0.5
  randomsizedcrop:
    p: 0
  normalize:
    mean:
    - 0.5
    - 0.5
    - 0.5
    std:
    - 0.5
    - 0.5
    - 0.5
run_sweep: false
dataset_config:
  tissue_types:
    Adrenal_gland: 0
    Bile-duct: 1
    Bladder: 2
    Breast: 3
    Cervix: 4
    Colon: 5
    Esophagus: 6
    HeadNeck: 7
    Kidney: 8
    Liver: 9
    Lung: 10
    Ovarian: 11
    Pancreatic: 12
    Prostate: 13
    Skin: 14
    Stomach: 15
    Testis: 16
    Thyroid: 17
    Uterus: 18
  nuclei_types:
    Background: 0
    Neoplastic: 1
    Inflammatory: 2
    Connective: 3
    Dead: 4
    Epithelial: 5
